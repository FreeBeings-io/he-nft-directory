name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: henft
          POSTGRES_PASSWORD: henft
          POSTGRES_DB: henft_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U henft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Tests
        env:
          HENFT_TEST_DSN: >-
            host=127.0.0.1 dbname=henft_test user=henft password=henft
        run: python -m pytest tests/ -q
